name: Weekly GitHub trending

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-trending:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run weekly trending script
        run: |
          python github_fastest_growing.py --limit 10 --json trending_weekly.json --csv trending_weekly.csv

      - name: Commit latest results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trending_weekly.json trending_weekly.csv
          git diff --cached --quiet || git commit -m "Update weekly GitHub trending data"
          git push
